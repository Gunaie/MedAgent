version: '3.8'

services:
  # Neo4j 知识图谱
  neo4j:
    image: neo4j:5.14-community
    container_name: medagent-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 医疗问诊机器人
  medagent:
    build: .
    container_name: medagent-app
    ports:
      - "7860:7860"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_MODEL=qwen3.5-flash
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/medagent.log
      - CHROMA_PERSIST_DIR=/app/data/db
    volumes:
      - ./data:/app/data
      - ./chat_history:/app/chat_history
      - ./logs:/app/logs
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs: